<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#2563eb" stroke="#1e40af" stroke-width="4"/>
  
  <!-- School building icon -->
  <g transform="translate(50, 60)">
    <!-- Main building -->
    <rect x="20" y="30" width="60" height="40" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
    <!-- Roof -->
    <polygon points="10,30 50,10 90,30" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
    <!-- Door -->
    <rect x="40" y="50" width="20" height="20" fill="#92400e" stroke="#451a03" stroke-width="1"/>
    <!-- Windows -->
    <rect x="25" y="35" width="12" height="12" fill="#60a5fa" stroke="#1e40af" stroke-width="1"/>
    <rect x="63" y="35" width="12" height="12" fill="#60a5fa" stroke="#1e40af" stroke-width="1"/>
    <!-- Flag -->
    <line x1="50" y1="10" x2="50" y2="25" stroke="#374151" stroke-width="2"/>
    <rect x="50" y="10" width="15" height="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  </g>
  
  <!-- INR99 Text -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">INR99</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">OFFLINE</text>
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">SCHOOL SERVER</text>
</svg>